name: Update messenger subscriber counters

on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Update Telegram subscriber counters
        run: node scripts/update-telegram-subscribers.mjs

      - name: Update MAX subscriber counters
        run: node scripts/update-max-subscribers.mjs

      - name: Commit updated counters
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- docs/telegram-subscribers.json docs/telegram-subscribers.js docs/max-subscribers.json docs/max-subscribers.js; then
            echo "No subscriber counter changes."
            exit 0
          fi

          git add docs/telegram-subscribers.json docs/telegram-subscribers.js docs/max-subscribers.json docs/max-subscribers.js
          git commit -m "Update messenger subscriber counters"
          git push
